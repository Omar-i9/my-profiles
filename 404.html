<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | عُـمَر</title>

  <style>
    @import url("https://fonts.googleapis.com/css?family=Barlow+Condensed:300,400,500,600,700,800,900|Barlow:300,400,500,600,700,800,900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap");

    :root {
      --bg: #695681;
      --bg-dark: #36184f;
      --text: #ffffff;
      --soft: rgba(255, 255, 255, 0.1);
      --card: rgba(54, 24, 79, 0.3);
      --accent-1: #ffedc0;
      --accent-2: #ff9d87;
      --accent-3: #fb8a8a;
    }

    * {
      box-sizing: border-box;
    }

    html, body, h1, h2, h3, h4, h5, h6, p, ul, li, button, a, i, input {
      margin: 0;
      padding: 0;
      list-style: none;
      border: 0;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      color: inherit;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Cairo", "Barlow", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, a {
      cursor: pointer;
    }

    button:focus,
    a:focus {
      outline: none;
    }

    /* Top bar */
    nav {
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5;
      padding: 18px 5%;
    }

    .menu {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 8px 12px 8px 14px;
      box-shadow: 0 10px 30px rgba(54, 24, 79, 0.18);
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
    }

    .brand .name {
      font-family: "Barlow", "Cairo", sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.4px;
      color: #ffffff;
      white-space: nowrap;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
      color: #fff;
      font-family: "Cairo", sans-serif;
      font-size: 15px;
      font-weight: 700;
      transition: all 0.25s ease;
      box-shadow: 0 10px 30px rgba(54, 24, 79, 0.18);
    }

    .home-link:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.26);
    }

    /* Layout */
    .wrapper {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
      padding: 90px 16px 24px;
    }

    .container {
      width: min(1100px, 100%);
      min-height: 640px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .one,
    .two,
    .three,
    .circle,
    .p404 {
      position: absolute;
      width: 60%;
      height: 60%;
      top: 20% !important;
      left: 20% !important;
      min-width: 400px;
      min-height: 400px;
    }

    .one .content,
    .two .content,
    .three .content,
    .circle .content,
    .p404 .content {
      width: 600px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: content 0.8s cubic-bezier(1, 0.06, 0.25, 1) backwards;
    }

    .one .content .piece,
    .two .content .piece,
    .three .content .piece,
    .circle .content .piece,
    .p404 .content .piece {
      width: 200px;
      height: 80px;
      display: flex;
      position: absolute;
      border-radius: 80px;
      z-index: 1;
      animation: pieceLeft 8s cubic-bezier(1, 0.06, 0.25, 1) infinite both;
    }

    .one .content::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background-color: rgba(54, 24, 79, 0.3);
      border-radius: 100%;
      box-shadow:
        inset 5px 20px 40px rgba(54, 24, 79, 0.25),
        inset 5px 0px 5px rgba(50, 36, 62, 0.3),
        inset 5px 5px 20px rgba(50, 36, 62, 0.25),
        2px 2px 5px rgba(255, 255, 255, 0.2);
      animation: circle 0.8s 0.4s cubic-bezier(1, 0.06, 0.25, 1) backwards;
    }

    .one .content .piece {
      background: linear-gradient(90deg, #8077ea 13.7%, #eb73ff 94.65%);
    }

    .one .content .piece:nth-child(1) {
      right: 15%;
      top: 18%;
      height: 30px;
      width: 120px;
      animation-delay: 0.5s;
      animation-name: pieceRight;
    }

    .one .content .piece:nth-child(2) {
      left: 15%;
      top: 45%;
      width: 150px;
      height: 50px;
      animation-delay: 1s;
      animation-name: pieceLeft;
    }

    .one .content .piece:nth-child(3) {
      left: 10%;
      top: 75%;
      height: 20px;
      width: 70px;
      animation-delay: 1.5s;
      animation-name: pieceLeft;
    }

    .two .content .piece {
      background: linear-gradient(90deg, #ffedc0 0%, #ff9d87 100%);
    }

    .two .content .piece:nth-child(1) {
      left: 0%;
      top: 25%;
      height: 40px;
      width: 120px;
      animation-delay: 2s;
      animation-name: pieceLeft;
    }

    .two .content .piece:nth-child(2) {
      right: 15%;
      top: 35%;
      width: 180px;
      height: 50px;
      animation-delay: 2.5s;
      animation-name: pieceRight;
    }

    .two .content .piece:nth-child(3) {
      right: 10%;
      top: 80%;
      height: 20px;
      width: 160px;
      animation-delay: 3s;
      animation-name: pieceRight;
    }

    .three .content .piece {
      background: var(--accent-3);
    }

    .three .content .piece:nth-child(1) {
      left: 25%;
      top: 35%;
      height: 20px;
      width: 80px;
      animation-name: pieceLeft;
      animation-delay: 3.5s;
    }

    .three .content .piece:nth-child(2) {
      right: 10%;
      top: 55%;
      width: 140px;
      height: 40px;
      animation-name: pieceRight;
      animation-delay: 4s;
    }

    .three .content .piece:nth-child(3) {
      left: 40%;
      top: 68%;
      height: 20px;
      width: 80px;
      animation-name: pieceLeft;
      animation-delay: 4.5s;
    }

    .circle::before {
      content: "";
      position: absolute;
      width: 800px;
      height: 800px;
      background-color: rgba(54, 24, 79, 0.2);
      border-radius: 100%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow:
        inset 5px 20px 40px rgba(54, 24, 79, 0.25),
        inset 5px 0px 5px rgba(50, 36, 62, 0.3),
        inset 5px 5px 20px rgba(50, 36, 62, 0.25),
        2px 2px 5px rgba(255, 255, 255, 0.2);
      animation: circle 0.8s cubic-bezier(1, 0.06, 0.25, 1) backwards;
    }

    .text {
      width: min(760px, 100%);
      min-height: 520px;
      position: absolute;
      margin: 40px 0 0;
      animation: text 0.6s 1.8s ease backwards;
      z-index: 4;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 0 16px;
    }

    .text article {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 28px;
      padding-bottom: 10px;
    }

    .text article p {
      color: white;
      font-size: 20px;
      line-height: 1.9;
      letter-spacing: 0.2px;
      text-shadow: 6px 6px 10px #32243e;
      font-weight: 600;
    }

    .text article button,
    .text article a.button {
      min-height: 46px;
      padding: 0 28px;
      border-radius: 999px;
      box-shadow: 0px 15px 20px rgba(54, 24, 79, 0.5);
      z-index: 3;
      color: #695681;
      background-color: white;
      font-family: "Cairo", sans-serif;
      text-transform: none;
      font-weight: 800;
      font-size: 15px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
    }

    .text article button:hover,
    .text article a.button:hover {
      box-shadow: 0px 10px 10px -10px rgba(54, 24, 79, 0.5);
      transform: translateY(5px);
      background: var(--accent-3);
      color: white;
    }

    .p404 {
      font-size: 200px;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
      display: flex !important;
      justify-content: center;
      align-items: center;
      z-index: 2;
      animation: anime404 0.6s cubic-bezier(0.3, 0.8, 1, 1.05) both;
      animation-delay: 1.2s;
      font-family: "Barlow", sans-serif;
    }

    .p404:nth-of-type(2) {
      color: #36184f;
      z-index: 1;
      animation-delay: 1s;
      filter: blur(10px);
      opacity: 0.8;
    }

    @keyframes content {
      0% {
        width: 0;
      }
    }

    @keyframes pieceLeft {
      0% {}
      50% {
        left: 80%;
        width: 10%;
      }
      100% {}
    }

    @keyframes pieceRight {
      0% {}
      50% {
        right: 80%;
        width: 10%;
      }
      100% {}
    }

    @keyframes text {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
    }

    @keyframes anime404 {
      0% {
        opacity: 0;
        transform: scale(10) skew(20deg, 20deg);
      }
    }

    @keyframes circle {
      0% {
        width: 0;
        height: 0;
      }
    }

    @media screen and (max-width: 799px) {
      nav {
        padding: 14px 16px 0;
      }

      .menu {
        align-items: flex-start;
      }

      .brand {
        padding: 7px 10px 7px 11px;
      }

      .brand img {
        width: 40px;
        height: 40px;
      }

      .brand .name {
        font-size: 15px;
      }

      .home-link {
        height: 40px;
        font-size: 13px;
        padding: 0 14px;
      }

      .one,
      .two,
      .three,
      .circle,
      .p404 {
        width: 90%;
        height: 90%;
        top: 5% !important;
        left: 5% !important;
        min-width: 280px;
        min-height: 280px;
      }

      .one .content,
      .two .content,
      .three .content,
      .circle .content,
      .p404 .content {
        width: 300px;
        height: 300px;
      }

      .one .content::before {
        width: 300px;
        height: 300px;
      }

      .circle::before {
        width: 400px;
        height: 400px;
      }

      .p404 {
        font-size: 100px;
      }

      .text {
        min-height: 440px;
        height: 82%;
      }

      .text article {
        width: 100%;
        gap: 22px;
      }

      .text article p {
        font-size: 17px;
        line-height: 1.8;
      }

      .text article button,
      .text article a.button {
        min-width: 150px;
        font-size: 14px;
      }
    }

    @media screen and (max-height: 660px) {
      .one,
      .two,
      .three,
      .circle,
      .p404 {
        min-width: 280px;
        min-height: 280px;
        width: 60%;
        height: 60%;
        top: 20% !important;
        left: 20% !important;
      }

      .text {
        min-height: 380px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="menu">
      <a class="brand" href="https://omar-i9.github.io/my-profiles/" aria-label="الانتقال إلى الصفحة الرئيسية">
        <img src="photo/profile.jpeg" alt="صورتي الشخصية">
        <span class="name">عُـمَر | Omar</span>
      </a>

      <a class="home-link" href="https://omar-i9.github.io/my-profiles/">اذهب إلى الموقع</a>
    </div>
  </nav>

  <section class="wrapper">
    <div class="container">
      <div id="scene" class="scene" data-hover-only="false">
        <div class="circle" data-depth="1.2"></div>

        <div class="one" data-depth="0.9">
          <div class="content">
            <span class="piece"></span>
            <span class="piece"></span>
            <span class="piece"></span>
          </div>
        </div>

        <div class="two" data-depth="0.60">
          <div class="content">
            <span class="piece"></span>
            <span class="piece"></span>
            <span class="piece"></span>
          </div>
        </div>

        <div class="three" data-depth="0.40">
          <div class="content">
            <span class="piece"></span>
            <span class="piece"></span>
            <span class="piece"></span>
          </div>
        </div>

        <p class="p404" data-depth="0.50">404</p>
        <p class="p404" data-depth="0.10">404</p>
      </div>

      <div class="text">
        <article>
          <p>عذرًا! يبدو أنك ضللت الطريق.<br>ارجع إلى الصفحة الرئيسية إذا كنت تجرؤ!</p>
          <a class="button" href="https://omar-i9.github.io/my-profiles/">اذهب إلى الموقع</a>
        </article>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
  <script>
    const scene = document.getElementById('scene');
    if (window.Parallax && scene) {
      new Parallax(scene);
    }
  </script>
</body>
</html>
